<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Materiales de Construcción</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(black, #1a1a1a);
      text-align: center;
    }

    .hero h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #aaa;
      margin-bottom: 30px;
    }

    .btn {
      padding: 15px 25px;
      margin: 10px;
      border: none;
      cursor: pointer;
      font-size: 16px;
      border-radius: 8px;
      text-decoration: none;
    }

    .btn-primary {
      background: #facc15;
      color: black;
    }

    .btn-secondary {
      border: 1px solid white;
      color: white;
    }

    .section {
      padding: 60px 20px;
      text-align: center;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .card {
      background: #1c1c1c;
      padding: 30px;
      width: 200px;
      border-radius: 10px;
    }

    .card h3 {
      margin-bottom: 10px;
    }

  </style>
</head>

<body>

  <!-- HERO -->
  <section class="hero">
    <h1>Materiales para Construcción</h1>
    <p>Jal, Tepetate y más al mejor precio</p>

    <a href="#cotizar" class="btn btn-primary">Cotizar ahora</a>

    <a href="https://wa.me/5213315457641?text=Hola%20quiero%20información"
       target="_blank"
       class="btn btn-secondary">
       WhatsApp
    </a>
  </section>

  <!-- PRODUCTOS -->
  <section class="section">
    <h2>Productos</h2>

    <div class="cards">
      <div class="card">
        <h3>Jal</h3>
        <p>Ideal para construcción</p>
      </div>

      <div class="card">
        <h3>Tepetate</h3>
        <p>Base firme para obra</p>
      </div>

      <div class="card">
        <h3>Grava</h3>
        <p>Material resistente</p>
      </div>
    </div>
  </section>

  <!-- COTIZACIÓN -->
  <section class="section" id="cotizar">
    <h2>Solicita tu cotización</h2>

    <form id="form">
      <input placeholder="Nombre" required><br><br>
      <input placeholder="Teléfono" required><br><br>
      <textarea placeholder="¿Qué necesitas?"></textarea><br><br>

      <button class="btn btn-primary">Enviar</button>
    </form>
  </section>

</body>
</html>
