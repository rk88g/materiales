<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Materiales de Construcción</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: #0d0d0d;
  color: white;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 40px;
  background: linear-gradient(180deg, #0d0d0d, #1a1a1a);
}

.hero h1 {
  font-size: 48px;
  max-width: 600px;
}

.hero p {
  color: #aaa;
  margin: 20px 0;
}

.btn {
  display: inline-block;
  padding: 14px 24px;
  border-radius: 10px;
  text-decoration: none;
  margin-right: 10px;
}

.btn-primary {
  background: #facc15;
  color: black;
  font-weight: 600;
}

.btn-outline {
  border: 1px solid white;
  color: white;
}

/* PRODUCTOS */
.section {
  padding: 80px 40px;
}

.section h2 {
  margin-bottom: 40px;
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
}

.card {
  background: #1c1c1c;
  padding: 30px;
  border-radius: 12px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

/* FORM */
.form-container {
  max-width: 500px;
  margin: auto;
  background: #1a1a1a;
  padding: 30px;
  border-radius: 12px;
}

.form-container input,
.form-container textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border: none;
  border-radius: 8px;
}

.form-container button {
  width: 100%;
  padding: 14px;
  background: #facc15;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

/* WHATSAPP FLOAT */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  color: white;
  padding: 15px 18px;
  border-radius: 50%;
  font-size: 20px;
  text-decoration: none;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

/* RESPONSIVE */
@media(max-width:768px){
  .hero h1 {
    font-size: 32px;
  }
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>Materiales para construcción de alta calidad</h1>
  <p>Jal, tepetate y agregados para tus proyectos</p>

  <div>
    <a href="#cotizar" class="btn btn-primary">Cotizar ahora</a>
  </div>
</section>

<!-- PRODUCTOS -->
<section class="section">
  <h2>Productos</h2>

  <div class="cards">
    <div class="card">
      <h3>Jal</h3>
      <p>Material ideal para obra y acabados.</p>
    </div>

    <div class="card">
      <h3>Tepetate</h3>
      <p>Base firme para construcción.</p>
    </div>

    <div class="card">
      <h3>Grava</h3>
      <p>Alta resistencia para estructuras.</p>
    </div>
  </div>
</section>

<!-- FORM -->
<section class="section" id="cotizar">
  <h2>Solicita tu cotización</h2>

  <div class="form-container">
    <form id="form">
      <input type="text" placeholder="Nombre" required>
      <input type="tel" placeholder="Teléfono" required>
      <textarea placeholder="¿Qué necesitas?"></textarea>
      <button>Enviar solicitud</button>
    </form>
  </div>
</section>

<!-- WHATSAPP FLOAT -->
<a class="whatsapp"
href="https://wa.me/5213315457641?text=Hola%20quiero%20información"
target="_blank">
💬
</a>

<!-- SCRIPT -->
<script>
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  const inputs = document.querySelectorAll("#form input, #form textarea");

  const nombre = inputs[0].value;
  const telefono = inputs[1].value;
  const mensaje = inputs[2].value;

  const texto = `Hola, quiero cotizar:
Nombre: ${nombre}
Teléfono: ${telefono}
Mensaje: ${mensaje}`;

  const url = "https://wa.me/5213315457641?text=" + encodeURIComponent(texto);

  window.open(url, "_blank");
});
</script>

</body>
</html>
